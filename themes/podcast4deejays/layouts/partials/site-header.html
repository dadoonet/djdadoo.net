<header class="site-header" data-pagefind-ignore="all">
  <div class="header-inner">
    <div class="header-title">
      <a href="{{ "/" | relURL }}"><img src="{{ .Site.Params.podcast.cover | absURL }}" alt="{{ .Site.Params.podcast.name }}" class="header-logo" /></a>
      <div>
        <h1>{{ .Site.Params.podcast.name }}</h1>
        <p class="header-sub">{{ .Site.Params.podcast.subtitle }}</p>
      </div>
    </div>
    <div class="header-actions">
      <div class="header-search" role="search" aria-label="Recherche sur le site">
        <label for="site-search-input" class="visually-hidden">Rechercher un mix</label>
        <input
          id="site-search-input"
          class="header-search-input"
          type="search"
          placeholder="Rechercher un mix..."
          autocomplete="off"
          spellcheck="false"
        />
        <div id="site-search-results" class="header-search-results" hidden></div>
      </div>
      <div class="header-socials">
        {{ range .Site.Data.socials }}
        <a href="{{ .href }}" target="{{ .target }}" title="{{ .title }}" class="social-link">
          <ion-icon name="{{ .icon }}"></ion-icon>
        </a>
        {{ end }}
      </div>
      <a class="itunes-link" href="{{ .Site.Params.podcast.podcastLink }}" target="_blank" rel="noopener">
        <ion-icon name="logo-apple"></ion-icon>
        Apple Podcasts
      </a>
    </div>
  </div>
</header>
